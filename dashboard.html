<h4 id="crud-form-title" class="text-xs font-bold text-slate-300 uppercase tracking-wider border-b border-slate-700 pb-2"><i class="fa-solid fa-plus mr-1 text-amber-500"></i> Tambah Menu Baru</h4>
<input type="hidden" id="menu-id">

<div class="space-y-1">
    <label class="text-[10px] text-slate-400 font-bold uppercase">Nama Menu</label>
    <input type="text" id="menu-name" placeholder="Contoh: Kopi Hitam" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500">
</div>

<div class="space-y-1">
    <label class="text-[10px] text-slate-400 font-bold uppercase">Kategori</label>
    <select id="menu-category" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500">
        <option value="Makanan">Makanan</option>
        <option value="Minuman">Minuman</option>
        <option value="Snack">Snack</option>
    </select>
</div>

<div class="space-y-1">
    <label class="text-[10px] text-slate-400 font-bold uppercase">Harga (Rp)</label>
    <input type="number" id="menu-price" placeholder="Contoh: 5000" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500">
</div>
<div class="space-y-1">
    <label class="text-[10px] text-slate-400 font-bold uppercase">Link URL Foto</label>
    <input type="text" id="menu-image" placeholder="https://..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500">
</div>
<div class="space-y-1">
    <label class="text-[10px] text-slate-400 font-bold uppercase">Deskripsi Menu</label>
    <textarea id="menu-desc" placeholder="Isi deskripsi singkat..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500 h-14"></textarea>
</div>
